# HelpBubble — Apache Alias
#
# Workaround para el firewall de GLPI 11 que bloquea POSTs a scripts legacy
# de plugins (issue glpi-project/glpi#21414). Servimos los endpoints HTTP
# del plugin (api/) directamente por Apache, fuera del routing de GLPI.
#
# Instalación:
#   cp apache/helpbubble.conf /etc/apache2/conf-available/helpbubble.conf
#   a2enconf helpbubble
#   apachectl graceful
#
# Ajustar la ruta absoluta abajo si tu instalación de GLPI no está en
# /var/www/html/glpi.

Alias /helpbubble-api /var/www/html/glpi/plugins/helpbubble/api

<Directory /var/www/html/glpi/plugins/helpbubble/api>
    Options -Indexes
    AllowOverride None
    Require all granted

    <FilesMatch "\.php$">
        SetHandler application/x-httpd-php
    </FilesMatch>
</Directory>
